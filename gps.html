<!DOCTYPE html>
<html>
<head>
<title>Location Test</title>
<script>
var options = {
  enableHighAccuracy: true,
  timeout: 5000,
  maximumAge: 0
};

function log(data) {
  const tag = document.createElement('p');
  tag.textContent = data;
  document.body.appendChild(tag);
}

function success(pos) {
  var crd = pos.coords;
  console.log('Successfully determined a user position:', crd);

  log('Your current position is:');
  log(`Latitude : ${crd.latitude}`);
  log(`Longitude: ${crd.longitude}`);
  log(`More or less ${crd.accuracy} meters.`);
  document.getElementById("placeholder").style.display = "none";
  document.getElementById("refresh").style.display = "block";
  document.body.style.cursor = 'default';
}

function error(err) {
  console.warn(`ERROR(${err.code}): ${err.message}`);
  document.getElementById("refresh").style.display = "block";
  document.getElementById("placeholder").style.display = "none";
  document.body.style.cursor = 'default';
}
function init() {
navigator.geolocation.getCurrentPosition(success, error, options);
}
</script>
<body onload="init();" style="cursor:wait;">
<div id="placeholder" style="cursor:wait;width:500px;height:500px">
</div>
<button id="refresh" style="display:none" onClick="window.location.reload();">Refresh Page</button>
</body>
</html>
